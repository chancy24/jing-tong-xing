<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鏅鸿建鎱ц AI鍖栧崌绾ц矾绾垮睍绀?/title>
  <style>
    :root {
      --bg: #050814;
      --bg-2: #08112a;
      --panel: rgba(13, 24, 52, 0.68);
      --panel-strong: rgba(17, 31, 68, 0.86);
      --glass: rgba(255, 255, 255, 0.07);
      --line: rgba(132, 181, 255, 0.24);
      --line-strong: rgba(117, 220, 255, 0.68);
      --text: #edf6ff;
      --muted: #a9b9d9;
      --subtle: #7182ab;
      --blue: #3e8bff;
      --cyan: #57e0ff;
      --violet: #8c62ff;
      --pink: #ff5fd2;
      --green: #58e6a6;
      --amber: #ffd36a;
      --danger: #ff718a;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      --radius: 8px;
      --nav-h: 68px;
      --max-w: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(62, 139, 255, 0.25), transparent 30%),
        radial-gradient(circle at 84% 18%, rgba(140, 98, 255, 0.22), transparent 34%),
        radial-gradient(circle at 55% 82%, rgba(87, 224, 255, 0.11), transparent 32%),
        linear-gradient(135deg, #050814 0%, #071026 48%, #09081f 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    body::before {
      background-image:
        linear-gradient(rgba(116, 174, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116, 174, 255, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.18));
    }

    body::after {
      background:
        linear-gradient(120deg, transparent 0 44%, rgba(87, 224, 255, 0.06) 45%, transparent 47% 100%),
        linear-gradient(38deg, transparent 0 62%, rgba(140, 98, 255, 0.08) 63%, transparent 65% 100%);
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      background: rgba(5, 9, 22, 0.72);
      border-bottom: 1px solid rgba(125, 184, 255, 0.18);
      backdrop-filter: blur(18px);
    }

    .nav-inner {
      width: min(100%, 1380px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 190px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      position: relative;
      border: 1px solid rgba(87, 224, 255, 0.72);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(87, 224, 255, 0.18), rgba(140, 98, 255, 0.28)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 24px rgba(87, 224, 255, 0.22);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(87, 224, 255, 0.9);
    }

    .brand-mark::before {
      width: 18px;
      height: 2px;
      top: 9px;
      left: 6px;
      transform: rotate(-20deg);
    }

    .brand-mark::after {
      width: 2px;
      height: 16px;
      right: 9px;
      bottom: 6px;
      transform: rotate(24deg);
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar {
      display: none;
    }

    .nav-link {
      color: var(--muted);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      white-space: nowrap;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      border-color: rgba(87, 224, 255, 0.3);
      background: rgba(87, 224, 255, 0.08);
    }

    .section {
      position: relative;
      min-height: 100vh;
      padding: calc(var(--nav-h) + 46px) 28px 52px;
      display: flex;
      align-items: center;
      scroll-margin-top: var(--nav-h);
      overflow: hidden;
    }

    .section::before {
      content: attr(data-index);
      position: absolute;
      right: clamp(22px, 5vw, 82px);
      top: calc(var(--nav-h) + 14px);
      color: rgba(255, 255, 255, 0.035);
      font-size: clamp(80px, 14vw, 188px);
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    .wrap {
      width: min(100%, var(--max-w));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-grid {
      width: min(100%, 1240px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.03fr) minmax(420px, 0.97fr);
      align-items: center;
      gap: clamp(30px, 5vw, 68px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--cyan);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 38px;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      box-shadow: 0 0 14px rgba(87, 224, 255, 0.7);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(46px, 6vw, 86px);
      line-height: 1.04;
      letter-spacing: 0;
      max-width: 900px;
      text-shadow: 0 0 30px rgba(87, 224, 255, 0.16);
    }

    .gradient-text {
      background: linear-gradient(90deg, #ffffff 0%, #70e9ff 46%, #a786ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin-top: 20px;
      max-width: 740px;
      color: #d6e4ff;
      font-size: clamp(20px, 2vw, 29px);
      line-height: 1.45;
      font-weight: 500;
    }

    .position-note {
      margin-top: 22px;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      padding: 14px 16px;
      border-left: 3px solid var(--cyan);
      background: rgba(87, 224, 255, 0.07);
      border-radius: 0 8px 8px 0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      color: #eaf8ff;
      font-size: 14px;
      border: 1px solid rgba(87, 224, 255, 0.35);
      border-radius: 8px;
      background: rgba(8, 24, 55, 0.65);
      box-shadow: inset 0 0 18px rgba(87, 224, 255, 0.08);
    }

    .tag-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
    }

    .hero-visual {
      min-height: 520px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .orbit {
      position: absolute;
      inset: 7% 4%;
      border-radius: 50%;
      border: 1px solid rgba(87, 224, 255, 0.14);
      transform: rotate(-16deg);
    }

    .orbit:nth-child(2) {
      inset: 14% 13%;
      border-color: rgba(140, 98, 255, 0.16);
      transform: rotate(25deg);
    }

    .rail-chip {
      width: min(100%, 520px);
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(126, 190, 255, 0.28);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(11, 22, 50, 0.62);
      box-shadow: var(--shadow), inset 0 0 50px rgba(87, 224, 255, 0.06);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .rail-chip::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(87, 224, 255, 0.2);
      border-radius: 8px;
    }

    .rail-chip::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -86px;
      top: -70px;
      background: radial-gradient(circle, rgba(255, 95, 210, 0.18), transparent 68%);
    }

    .rail-chip svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .track-line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 5;
      filter: drop-shadow(0 0 7px rgba(87, 224, 255, 0.7));
      stroke-dasharray: 14 12;
      animation: dashFlow 3.5s linear infinite;
    }

    .track-blue {
      stroke: var(--blue);
    }

    .track-cyan {
      stroke: var(--cyan);
      animation-duration: 4.2s;
    }

    .track-violet {
      stroke: var(--violet);
      animation-duration: 4.8s;
    }

    .chip-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 164px;
      height: 164px;
      transform: translate(-50%, -50%);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(87, 224, 255, 0.18), rgba(140, 98, 255, 0.18)),
        rgba(7, 14, 33, 0.92);
      border: 1px solid rgba(87, 224, 255, 0.55);
      box-shadow: 0 0 40px rgba(87, 224, 255, 0.18), inset 0 0 30px rgba(140, 98, 255, 0.12);
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 2;
    }

    .chip-core strong {
      display: block;
      font-size: 46px;
      line-height: 1;
      letter-spacing: 0;
    }

    .chip-core span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pin {
      position: absolute;
      width: 32px;
      height: 5px;
      border-radius: 8px;
      background: rgba(87, 224, 255, 0.36);
      box-shadow: 0 0 12px rgba(87, 224, 255, 0.5);
      z-index: 3;
    }

    .pin.p1 { left: 34%; top: 29%; transform: rotate(90deg); }
    .pin.p2 { right: 28%; top: 36%; }
    .pin.p3 { left: 22%; bottom: 31%; }
    .pin.p4 { right: 36%; bottom: 22%; transform: rotate(90deg); }

    .station {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #08132d;
      border: 3px solid var(--cyan);
      box-shadow: 0 0 16px rgba(87, 224, 255, 0.78);
      z-index: 4;
    }

    .s1 { left: 18%; top: 24%; }
    .s2 { right: 20%; top: 27%; border-color: var(--violet); }
    .s3 { left: 28%; bottom: 17%; border-color: var(--green); }
    .s4 { right: 18%; bottom: 28%; border-color: var(--amber); }
    .s5 { left: 48%; top: 16%; border-color: var(--pink); }

    .metric-strip {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 26px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      z-index: 5;
    }

    .mini-metric {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(3, 10, 28, 0.62);
    }

    .mini-metric b {
      display: block;
      color: var(--text);
      font-size: 20px;
    }

    .mini-metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .section-head {
      margin-bottom: 30px;
      max-width: 920px;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 12px;
      color: var(--cyan);
      font-size: 14px;
      font-weight: 800;
    }

    .section-kicker::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
    }

    h2 {
      font-size: clamp(32px, 4vw, 54px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      margin-top: 12px;
      max-width: 860px;
      color: var(--muted);
      font-size: clamp(15px, 1.35vw, 18px);
      line-height: 1.8;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .card {
      position: relative;
      min-height: 190px;
      padding: 22px;
      border: 1px solid rgba(126, 190, 255, 0.22);
      border-radius: var(--radius);
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      transform: translateY(18px);
      opacity: 0;
      transition: transform 0.7s ease, opacity 0.7s ease, border-color 0.25s ease;
    }

    .card.in-view {
      transform: translateY(0);
      opacity: 1;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(87, 224, 255, 0.1), transparent);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
    }

    .card:hover {
      border-color: rgba(87, 224, 255, 0.46);
    }

    .card:hover::before {
      transform: translateX(120%);
    }

    .card-number {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      color: var(--text);
      border-radius: 8px;
      border: 1px solid rgba(87, 224, 255, 0.42);
      background: rgba(87, 224, 255, 0.1);
      box-shadow: inset 0 0 16px rgba(87, 224, 255, 0.09);
      font-weight: 800;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      margin-bottom: 12px;
    }

    .card p,
    .card li {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.72;
    }

    .card ul {
      margin: 0;
      padding-left: 18px;
    }

    .rail-backdrop {
      position: absolute;
      inset: auto 5% 4% auto;
      width: 420px;
      height: 260px;
      pointer-events: none;
      opacity: 0.17;
    }

    .comparison {
      display: grid;
      gap: 14px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 70px minmax(0, 1fr);
      align-items: stretch;
      gap: 14px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .compare-row.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    .compare-cell {
      min-height: 78px;
      display: flex;
      align-items: center;
      padding: 17px 18px;
      border-radius: 8px;
      border: 1px solid rgba(126, 190, 255, 0.22);
      background: rgba(11, 24, 55, 0.64);
      color: #dce9ff;
      font-size: 17px;
      line-height: 1.45;
    }

    .compare-cell.ai {
      border-color: rgba(87, 224, 255, 0.36);
      background: linear-gradient(135deg, rgba(87, 224, 255, 0.11), rgba(140, 98, 255, 0.11));
      color: var(--text);
    }

    .arrow-cell {
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-weight: 900;
      font-size: 28px;
    }

    .module-card {
      min-height: 210px;
    }

    .module-card .card-number {
      margin-bottom: 16px;
    }

    .matrix {
      overflow: hidden;
      border: 1px solid rgba(126, 190, 255, 0.22);
      border-radius: 8px;
      background: rgba(5, 13, 31, 0.58);
      box-shadow: var(--shadow);
    }

    .matrix-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      border-bottom: 1px solid rgba(126, 190, 255, 0.16);
      min-height: 68px;
      opacity: 0;
      transform: translateX(-16px);
      transition: transform 0.62s ease, opacity 0.62s ease;
    }

    .matrix-row.in-view {
      opacity: 1;
      transform: translateX(0);
    }

    .matrix-row:last-child {
      border-bottom: 0;
    }

    .matrix-key {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px;
      color: #eef7ff;
      font-weight: 800;
      background: rgba(87, 224, 255, 0.07);
      border-right: 1px solid rgba(126, 190, 255, 0.16);
    }

    .matrix-key::before {
      content: "";
      width: 7px;
      height: 26px;
      border-radius: 8px;
      background: linear-gradient(180deg, var(--cyan), var(--violet));
      box-shadow: 0 0 16px rgba(87, 224, 255, 0.44);
    }

    .matrix-value {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      color: var(--muted);
      line-height: 1.62;
    }

    .timeline {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-top: 14px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50px;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--green));
      box-shadow: 0 0 18px rgba(87, 224, 255, 0.35);
    }

    .timeline-item {
      position: relative;
      padding: 86px 20px 22px;
      min-height: 246px;
      border: 1px solid rgba(126, 190, 255, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        rgba(11, 24, 55, 0.64);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .timeline-item.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    .timeline-dot {
      position: absolute;
      top: 35px;
      left: 24px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      background: #071024;
      box-shadow: 0 0 22px rgba(87, 224, 255, 0.55);
    }

    .timeline-dot::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: var(--cyan);
    }

    .timeline-item b {
      display: block;
      margin-bottom: 12px;
      font-size: 22px;
      color: var(--text);
    }

    .timeline-item p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.78;
    }

    .demo-shell {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }

    .demo-panel {
      border: 1px solid rgba(126, 190, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(7, 16, 38, 0.78);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .demo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px 18px;
      border-bottom: 1px solid rgba(126, 190, 255, 0.16);
      background: rgba(87, 224, 255, 0.06);
    }

    .window-dots {
      display: inline-flex;
      gap: 7px;
    }

    .window-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--subtle);
    }

    .window-dots span:nth-child(1) { background: var(--danger); }
    .window-dots span:nth-child(2) { background: var(--amber); }
    .window-dots span:nth-child(3) { background: var(--green); }

    .demo-title {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .demo-body {
      padding: 20px;
    }

    textarea {
      width: 100%;
      min-height: 238px;
      resize: vertical;
      color: var(--text);
      background: rgba(2, 8, 23, 0.66);
      border: 1px solid rgba(126, 190, 255, 0.25);
      border-radius: 8px;
      padding: 18px;
      outline: none;
      font: inherit;
      font-size: 17px;
      line-height: 1.78;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      border-color: rgba(87, 224, 255, 0.68);
      box-shadow: 0 0 0 4px rgba(87, 224, 255, 0.08);
    }

    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .primary-btn {
      position: relative;
      min-height: 46px;
      padding: 0 20px;

  <script>
    const navLinks = Array.from(document.querySelectorAll(".nav-link"));
    const sections = Array.from(document.querySelectorAll(".section"));
    const animatedItems = Array.from(document.querySelectorAll(".card, .compare-row, .matrix-row, .timeline-item, .value-card"));
    const counters = Array.from(document.querySelectorAll(".count"));
    const generateBtn = document.getElementById("generateBtn");
    const resultList = document.getElementById("resultList");
    const resultPlaceholder = document.getElementById("resultPlaceholder");
    const loadingLine = document.getElementById("loadingLine");

    function setActiveNav(id) {
      navLinks.forEach((link) => {
        link.classList.toggle("active", link.getAttribute("href") === "#" + id);
      });
    }

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          setActiveNav(entry.target.id);
        }
      });
    }, {
      root: null,
      threshold: 0.48
    });

    sections.forEach((section) => sectionObserver.observe(section));

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("in-view");
          revealObserver.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.18
    });

    animatedItems.forEach((item, index) => {
      item.style.transitionDelay = Math.min(index % 6, 5) * 70 + "ms";
      revealObserver.observe(item);
    });

    function animateCounter(counter) {
      if (counter.dataset.done) return;
      counter.dataset.done = "true";
      const target = Number(counter.dataset.target || 0);
      const duration = 1100;
      const start = performance.now();

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        counter.textContent = Math.round(target * eased);
        if (progress < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    const counterObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          animateCounter(entry.target);
          counterObserver.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.7
    });

    counters.forEach((counter) => counterObserver.observe(counter));

    const demoResults = [
      { icon: "01", title: "宸茶瘑鍒紓甯?, text: "2鍚嶄汉鍛樼己鍕わ紝褰卞搷鏄庢棩鏃╅珮宄板叧閿箻鍔＄墖娈点€? },
      { icon: "02", title: "璋冩暣寤鸿", text: "鏇挎崲3涓箻鍔＄墖娈碉紝浼樺厛淇濇寔鍑洪€€鍕ゅ湴鐐逛竴鑷达紝骞朵繚鎸佷紤鎭棿闅斿悎瑙勩€? },
      { icon: "03", title: "椋庨櫓鎻愮ず", text: "1鍚嶄汉鍛樻帴杩戣繛缁伐浣滀笂闄愶紝寤鸿瀹夋帓澶囩敤浜哄憳鎴栭檷浣庡悗缁彮娆″己搴︺€? },
      { icon: "04", title: "浼樺寲缁撴灉", text: "棰勮鍑忓皯浜哄伐璋冩暣鏃堕棿锛屾彁鍗囨柟妗堝悎瑙勬€э紝鏈€缁堟柟妗堜粛鐢辫皟搴︿汉鍛樺鏍哥‘璁ゃ€? }
    ];

    function clearResults() {
      resultList.innerHTML = "";
      resultList.classList.remove("show");
      resultPlaceholder.style.display = "grid";
    }

    function showResults() {
      clearResults();
      resultPlaceholder.style.display = "none";
      resultList.classList.add("show");

      demoResults.forEach((item, index) => {
        const li = document.createElement("li");
        li.className = "result-item";
        li.innerHTML = `
          <span class="result-icon">${item.icon}</span>
          <span class="result-text"><b>${item.title}</b><span></span></span>
        `;
        resultList.appendChild(li);

        const textNode = li.querySelector(".result-text span");
        setTimeout(() => {
          li.classList.add("visible");
          typeText(textNode, item.text, 18);
        }, index * 360);
      });
    }

    function typeText(node, text, speed) {
      node.textContent = "";
      let i = 0;

      function addChar() {
        node.textContent += text.charAt(i);
        i += 1;
        if (i < text.length) {
          setTimeout(addChar, speed);
        }
      }

      addChar();
    }

    generateBtn.addEventListener("click", () => {
      generateBtn.disabled = true;
      generateBtn.textContent = "鐢熸垚涓?..";
      loadingLine.classList.add("show");
      clearResults();

      setTimeout(() => {
        loadingLine.classList.remove("show");
        showResults();
        generateBtn.disabled = false;
        generateBtn.textContent = "閲嶆柊鐢熸垚AI寤鸿";
      }, 760);
    });
  </script>
